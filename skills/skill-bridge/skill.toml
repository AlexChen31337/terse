[skill]
name        = "skill-bridge"
version     = "1.0.0"
description = "Unified Skill Spec bridge adapter — convert, validate, and install skills across OpenClaw and EvoClaw runtimes."
author      = "Alex Chen <alex.chen31337@gmail.com>"
license     = "MIT"
repository  = "https://github.com/clawinfra/evoclaw"

[skill.compat]
openclaw = true
evoclaw  = true
clawhub  = true

[skill.tags]
tags = ["devtools", "skills", "evoclaw", "openclaw", "clawhub", "bridge"]

[skill.deps]
python = ">=3.11"
# No external deps — stdlib only (tomllib from Python 3.11+, falls back to tomli or minimal parser)

[skill.evoclaw]
permissions = ["filesystem", "shell"]
env         = []

[tools.validate]
command      = "uv run python scripts/bridge.py validate"
description  = "Validate a unified skill directory (checks SKILL.md + skill.toml consistency)"
args         = []
timeout_secs = 10

[tools.convert-to-evoclaw]
command      = "uv run python scripts/bridge.py convert-to-evoclaw"
description  = "Convert an OpenClaw skill (SKILL.md) to unified format by generating skill.toml"
args         = []
timeout_secs = 15

[tools.convert-to-openclaw]
command      = "uv run python scripts/bridge.py convert-to-openclaw"
description  = "Convert an EvoClaw skill (skill.toml) to unified format by generating SKILL.md"
args         = []
timeout_secs = 15

[tools.install-evoclaw]
command      = "uv run python scripts/bridge.py install-evoclaw"
description  = "Install a skill into an EvoClaw skills directory (copies + generates agent.toml)"
args         = []
timeout_secs = 30

[genome]
weight  = 0.3    # Low weight — this is a utility skill, not a core capability
enabled = true
